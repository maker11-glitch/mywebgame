<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>초특급 두더지 파티!</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome (아이콘용) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
        body {
            font-family: 'Jua', sans-serif;
            background: linear-gradient(135deg, #a8e063 0%, #56ab2f 100%);
            user-select: none;
            -webkit-user-select: none;
            overflow-x: hidden;
            transition: background 0.5s ease;
        }
        /* 피버타임 배경 애니메이션 */
        body.fever-active-bg {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            animation: rainbowBg 4s infinite alternate;
        }
        @keyframes rainbowBg {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        /* 장난감 망치 커서 (데스크탑 플레이어용) */
        .game-board-area {
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='40' height='40' viewBox='0 0 40 40'><text y='30' font-size='30'>🔨</text></svg>"), auto;
        }
        .game-board-area:active {
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='40' height='40' viewBox='0 0 40 40'><g transform='rotate(-30 20 20)'><text y='30' font-size='30'>🔨</text></g></svg>"), auto;
        }
        /* 두더지 등장 애니메이션 */
        .mole-hole {
            perspective: 1000px;
        }
        .mole {
            transition: transform 0.12s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: translateY(100%);
        }
        .mole.up {
            transform: translateY(0%);
        }
        /* 타격 성공 시 흔들림 애니메이션 */
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
        .hit-effect {
            animation: pop 0.15s ease-out;
        }
        /* 숫자가 위로 둥실 떠오르는 이펙트 */
        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.8); opacity: 0; }
            20% { opacity: 1; transform: translateY(-20px) scale(1.2); }
            100% { transform: translateY(-60px) scale(1); opacity: 0; }
        }
        .floating-text {
            animation: floatUp 0.8s forwards ease-out;
            pointer-events: none;
        }
        /* 불타오르는 콤보 애니메이션 */
        @keyframes comboPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .combo-active {
            animation: comboPulse 0.5s infinite;
        }
        /* 피버 테두리 플래시 효과 */
        .fever-glow {
            box-shadow: 0 0 25px #ff00ff, inset 0 0 15px #ff00ff;
            animation: borderFlash 0.5s infinite alternate;
        }
        @keyframes borderFlash {
            0% { border-color: #ffd700; box-shadow: 0 0 15px #ffd700, inset 0 0 10px #ffd700; }
            100% { border-color: #ff007f; box-shadow: 0 0 30px #ff007f, inset 0 0 20px #ff007f; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-between p-4 text-slate-800">

    <!-- 상단 대시보드 -->
    <header id="main-header" class="w-full max-w-md bg-white/95 backdrop-blur-sm rounded-3xl p-5 shadow-2xl border-4 border-amber-500 mt-2 relative z-10 transition-all duration-300">
        <!-- 피버 타임 뱃지 -->
        <div id="fever-banner" class="hidden text-center mb-2 animate-bounce">
            <span class="bg-gradient-to-r from-red-500 via-yellow-400 to-pink-500 text-white font-black px-6 py-1 rounded-full text-base shadow-lg border-2 border-white">
                ⚡ FEVER TIME (점수 2배!) ⚡
            </span>
        </div>

        <h1 class="text-3xl md:text-4xl text-amber-600 mb-2 flex items-center justify-center gap-2">
            <span class="inline-block animate-bounce">🔨</span>
            신나는 두더지 파티!
        </h1>
        
        <!-- 실시간 타이머 프로그레스 바 -->
        <div class="w-full bg-slate-200 h-4 rounded-full overflow-hidden mb-4 border border-slate-300">
            <div id="time-bar" class="bg-gradient-to-r from-emerald-500 via-yellow-400 to-red-500 h-full w-full transition-all duration-1000 ease-linear"></div>
        </div>

        <!-- 스펙타클 상태판 -->
        <div class="grid grid-cols-3 gap-2 bg-amber-50 p-3 rounded-2xl border-2 border-amber-200">
            <div class="text-center">
                <span class="block text-xs text-amber-700">현재 점수</span>
                <span id="score-display" class="text-3xl font-bold text-amber-600">0</span>
            </div>
            <div class="text-center border-x-2 border-amber-200/50 flex flex-col justify-center items-center">
                <span class="block text-xs text-amber-700">남은 시간</span>
                <span id="timer-display" class="text-2xl font-bold text-slate-700">30초</span>
            </div>
            <div class="text-center">
                <span class="block text-xs text-amber-700">최고 기록</span>
                <span id="high-score-display" class="text-3xl font-bold text-blue-600">0</span>
            </div>
        </div>

        <!-- 콤보 게이지 및 피버 활성화도 -->
        <div class="mt-3 h-8 flex justify-between items-center px-2">
            <div id="combo-container" class="hidden">
                <span class="bg-gradient-to-r from-red-500 to-orange-500 text-white font-extrabold px-3 py-1 rounded-full text-sm shadow-md combo-active">
                    🔥 <span id="combo-count">0</span> COMBO!
                </span>
            </div>
            <div class="text-xs text-slate-500 font-bold ml-auto flex items-center gap-1">
                <span>피버 게이지:</span>
                <span id="fever-gauge" class="text-red-500 font-black text-sm">0/7</span>
            </div>
        </div>
    </header>

    <!-- 두더지 종류 안내 보드 -->
    <section class="w-full max-w-md bg-white/80 backdrop-blur-xs rounded-2xl py-2 px-3 shadow-md text-[11px] md:text-xs flex justify-around items-center border border-white/40 mt-3">
        <div class="flex items-center gap-1">
            <span class="text-lg">🐹</span>
            <span>일반(+1)</span>
        </div>
        <div class="flex items-center gap-1">
            <span class="text-lg">👑</span>
            <span>황금(+2)</span>
        </div>
        <div class="flex items-center gap-1">
            <span class="text-lg">⏰</span>
            <span class="text-blue-600 font-bold">시계(+3초)</span>
        </div>
        <div class="flex items-center gap-1">
            <span class="text-lg">💣</span>
            <span class="text-red-600 font-bold">폭탄(-2)</span>
        </div>
    </section>

    <!-- 메인 게임 보드 -->

                </div>
                <div class="absolute bottom-0 w-full h-1/4 bg-amber-800 rounded-b-full border-t-2 border-amber-900 pointer-events-none"></div>
            </div>
            <!-- 구멍 3 -->
            <div class="mole-hole relative aspect-square bg-amber-900/90 rounded-full border-b-8 border-amber-950 overflow-hidden shadow-inner flex items-end justify-center">
                <div class="mole absolute bottom-0 w-[85%] h-[85%] cursor-pointer flex flex-col items-center justify-end" data-index="2" data-type="normal">
                    <svg viewBox="0 0 100 100" class="w-full h-full drop-shadow-lg mole-svg"></svg>
                </div>
                <div class="absolute bottom-0 w-full h-1/4 bg-amber-800 rounded-b-full border-t-2 border-amber-900 pointer-events-none"></div>
            </div>
            <!-- 구멍 4 -->
            <div class="mole-hole relative aspect-square bg-amber-900/90 rounded-full border-b-8 border-amber-950 overflow-hidden shadow-inner flex items-end justify-center">
                <div class="mole absolute bottom-0 w-[85%] h-[85%] cursor-pointer flex flex-col items-center justify-end" data-index="3" data-type="normal">
                    <svg viewBox="0 0 100 100" class="w-full h-full drop-shadow-lg mole-svg"></svg>
                </div>
                <div class="absolute bottom-0 w-full h-1/4 bg-amber-800 rounded-b-full border-t-2 border-amber-900 pointer-events-none"></div>
            </div>
            <!-- 구멍 5 -->
            <div class="mole-hole relative aspect-square bg-amber-900/90 rounded-full border-b-8 border-amber-950 overflow-hidden shadow-inner flex items-end justify-center">

                </div>

            </div>
            <!-- 구멍 6 -->
            <div class="mole-hole relative aspect-square bg-amber-900/90 rounded-full border-b-8 border-amber-950 overflow-hidden shadow-inner flex items-end justify-center">
                <div class="mole absolute bottom-0 w-[85%] h-[85%] cursor-pointer flex flex-col items-center justify-end" data-index="5" data-type="normal">

                </div>
                <div class="absolute bottom-0 w-full h-1/4 bg-amber-800 rounded-b-full border-t-2 border-amber-900 pointer-events-none"></div>
            </div>
            <!-- 구멍 7 -->
            <div class="mole-hole relative aspect-square bg-amber-900/90 rounded-full border-b-8 border-amber-950 overflow-hidden shadow-inner flex items-end justify-center">
                <div class="mole absolute bottom-0 w-[85%] h-[85%] cursor-pointer flex flex-col items-center justify-end" data-index="6" data-type="normal">
                    <svg viewBox="0 0 100 100" class="w-full h-full drop-shadow-lg mole-svg"></svg>
                </div>
                <div class="absolute bottom-0 w-full h-1/4 bg-amber-800 rounded-b-full border-t-2 border-amber-900 pointer-events-none"></div>
            </div>
            <!-- 구멍 8 -->
            <div class="mole-hole relative aspect-square bg-amber-900/90 rounded-full border-b-8 border-amber-950 overflow-hidden shadow-inner flex items-end justify-center">
                <div class="mole absolute bottom-0 w-[85%] h-[85%] cursor-pointer flex flex-col items-center justify-end" data-index="7" data-type="normal">
                    <svg viewBox="0 0 100 100" class="w-full h-full drop-shadow-lg mole-svg"></svg>
                </div>
                <div class="absolute bottom-0 w-full h-1/4 bg-amber-800 rounded-b-full border-t-2 border-amber-900 pointer-events-none"></div>
            </div>
            <!-- 구멍 9 -->
            <div class="mole-hole relative aspect-square bg-amber-900/90 rounded-full border-b-8 border-amber-950 overflow-hidden shadow-inner flex items-end justify-center">

                    <svg viewBox="0 0 100 100" class="w-full h-full drop-shadow-lg mole-svg"></svg>
                </div>

    </main>

    <!-- 하단 컨트롤 영역 -->
    <footer id="main-footer" class="w-full max-w-md bg-white/95 rounded-3xl p-4 shadow-xl border-4 border-amber-500 mb-2 text-center z-10 transition-all duration-300">
        <!-- 난이도 설정 -->
        <div class="mb-3">
            <span class="text-xs text-gray-500 block mb-1 font-bold">난이도 선택</span>
            <div class="flex justify-around bg-slate-100 p-1 rounded-2xl">
                <button id="btn-easy" class="difficulty-btn px-4 py-1 rounded-xl text-sm font-semibold transition bg-amber-500 text-white shadow" onclick="setDifficulty('easy')">쉬움</button>
                <button id="btn-medium" class="difficulty-btn px-4 py-1 rounded-xl text-sm font-semibold text-slate-600 transition" onclick="setDifficulty('medium')">보통</button>
                <button id="btn-hard" class="difficulty-btn px-4 py-1 rounded-xl text-sm font-semibold text-slate-600 transition" onclick="setDifficulty('hard')">어려움</button>
            </div>
        </div>

        <div class="flex gap-3">
            <button id="start-btn" class="flex-1 bg-gradient-to-r from-emerald-500 to-green-600 hover:from-emerald-600 hover:to-green-700 text-white text-lg font-bold py-2.5 px-6 rounded-2xl shadow-lg transition transform hover:-translate-y-0.5 active:translate-y-0">
                게임 시작!
            </button>
            <button id="reset-btn" class="bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-2.5 px-5 rounded-2xl shadow transition">
                <i class="fa-solid fa-rotate-left"></i>
            </button>
        </div>
    </footer>

    <!-- 게임오버 팝업 모달 -->
    <div id="gameover-modal" class="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50 hidden p-4 animate-fade-in">
        <div class="bg-white rounded-3xl p-6 max-w-sm w-full text-center border-4 border-amber-500 shadow-2xl transform scale-95 transition-all duration-300">
            <div class="text-6xl mb-2">🏅</div>
            <h2 class="text-3xl text-amber-600 mb-1">게임 종료!</h2>
            
            <!-- 점수 및 칭호 표시판 -->
            <div class="bg-amber-50 p-4 rounded-2xl mb-6 border-2 border-amber-200 shadow-inner">
                <div class="mb-3">
                    <span class="text-xs text-amber-800 block font-bold mb-1">나의 획득 점수</span>
                    <span id="modal-score" class="text-4xl font-black text-amber-600">0점</span>
                </div>
                
                <!-- 획득 칭호 -->
                <div class="border-t border-amber-200 pt-3">
                    <span class="text-xs text-amber-800 block font-bold mb-1">🎉 순발력 등급 칭호 🎉</span>
                    <span id="modal-title" class="text-xl font-extrabold text-purple-600">아기 두더지 파수꾼 🐹</span>
                </div>
                
                <div id="new-record-tag" class="hidden mt-3 text-xs bg-red-500 text-white px-3 py-1 rounded-full animate-pulse inline-block font-bold">
                    🏆 최고 기록 달성!
                </div>
            </div>

            <button id="modal-close-btn" class="w-full bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-600 hover:to-orange-600 text-white text-lg font-bold py-3 px-6 rounded-2xl shadow-md transition">
                다시 도전하기
            </button>
        </div>
    </div>

    <!-- 게임 로직 스크립트 -->

            bomb: {

                    <path d="M 72 26 L 58 32" stroke="#ff3333" stroke-width="3.5" stroke-linecap="round" />

                    <polygon points="50,40 47,45 53,45" fill="#ff3333" />

                    <circle cx="36" cy="34" r="8" fill="#fff" />

                    <path d="M 60 34 A 4 4 0 1 1 68 34" stroke="#000" stroke-width="1.5" fill="none" />

                    <ellipse cx="50" cy="48" rx="8" ry="6" fill="#fff" />

            },
            clock: {
                alive: `
                    <!-- 4. 시간 연장 시계 두더지 -->
                    <ellipse cx="50" cy="65" rx="35" ry="35" fill="#4682b4" />

                    <ellipse cx="50" cy="40" rx="22" ry="18" fill="#e0eee0" />
                    <!-- 귀여운 돋보기 안경 같은 눈 -->
                    <circle cx="40" cy="36" r="6" stroke="#4682b4" stroke-width="2" fill="#fff" />
                    <circle cx="60" cy="36" r="6" stroke="#4682b4" stroke-width="2" fill="#fff" />
                    <circle cx="40" cy="36" r="2.5" fill="#000" />
                    <circle cx="60" cy="36" r="2.5" fill="#000" />
                    <!-- 배위에 시계 메고 있음 -->
                    <circle cx="50" cy="72" r="16" fill="#fff" stroke="#ff69b4" stroke-width="3" />
                    <!-- 시계 바늘 -->
                    <line x1="50" y1="72" x2="50" y2="62" stroke="#333" stroke-width="2" stroke-linecap="round" />
                    <line x1="50" y1="72" x2="58" y2="72" stroke="#333" stroke-width="2" stroke-linecap="round" />
                    <!-- 코 -->
                    <ellipse cx="50" cy="44" rx="4" ry="2.5" fill="#e0522d" />
                `,
                hit: `
                    <ellipse cx="50" cy="65" rx="35" ry="35" fill="#4682b4" />
                    <ellipse cx="50" cy="38" rx="30" ry="24" fill="#4682b4" />
                    <ellipse cx="50" cy="40" rx="22" ry="18" fill="#e0eee0" />
                    <!-- 깨진 안경 눈 X X -->
                    <path d="M 34 32 L 44 42 M 44 32 L 34 42" stroke="#4682b4" stroke-width="3" stroke-linecap="round" />
                    <path d="M 56 32 L 66 42 M 66 32 L 56 42" stroke="#4682b4" stroke-width="3" stroke-linecap="round" />
                    <!-- 머리 꼬꼬댁 별 뱅뱅 도는 왕관 효과선 -->
                    <path d="M 38 14 Q 50 8 62 14" stroke="#ffd700" stroke-width="2.5" stroke-dasharray="3,3" fill="none" />
                    <!-- 찌그러진 시계 -->
                    <circle cx="50" cy="72" r="16" fill="#ffe4e1" stroke="#ff1493" stroke-width="3" />
                    <!-- 뱅글뱅글 꼬인 시계 바늘 -->
                    <path d="M 50 72 Q 45 66 54 60" stroke="#333" stroke-width="2" fill="none" />

        };

        // 9개 두더지 SVG 초기 설정
        function drawMoles() {
            moles.forEach(mole => {
                const svg = mole.querySelector('.mole-svg');
                svg.innerHTML = svgTemplates.normal.alive;
            });
        }
        drawMoles();

        // 사운드 합성기 (Web Audio API)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            if (type === 'normal') {
                // 삑! 귀여운 타격음
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(320, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(780, audioCtx.currentTime + 0.12);
                gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.12);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.12);
            } 
            else if (type === 'golden') {
                // 또르릉 샤방한 프리미엄 벨소리
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1600, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                
                const osc2 = audioCtx.createOscillator();
                const gain2 = audioCtx.createGain();
                osc2.type = 'sine';
                osc2.frequency.setValueAtTime(1100, audioCtx.currentTime);
                gain2.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc2.connect(gain2);
                gain2.connect(audioCtx.destination);
                
                osc.start();
                osc2.start();
                osc.stop(audioCtx.currentTime + 0.2);
                osc2.stop(audioCtx.currentTime + 0.2);
            } 
            else if (type === 'clock') {
                // 띠리링 알람 소리 (시간 연장)
                osc.type = 'square';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.setValueAtTime(900, audioCtx.currentTime + 0.08);
                osc.frequency.setValueAtTime(1200, audioCtx.currentTime + 0.16);
                gain.gain.setValueAtTime(0.18, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.24);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.24);
            }
            else if (type === 'bomb') {
                // 퍼어엉 무거운 폭발음
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(30, audioCtx.currentTime + 0.4);
                gain.gain.setValueAtTime(0.35, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.4);
            } 
            else if (type === 'fever-start') {
                // 피버 발동 효과음 (상승 플로우)
                const baseFreq = 220;
                for (let i = 0; i < 8; i++) {
                    const oscF = audioCtx.createOscillator();
                    const gainF = audioCtx.createGain();
                    oscF.type = 'sine';
                    oscF.frequency.setValueAtTime(baseFreq * Math.pow(1.25, i), audioCtx.currentTime + i * 0.05);
                    gainF.gain.setValueAtTime(0.15, audioCtx.currentTime + i * 0.05);
                    gainF.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.05 + 0.15);
                    oscF.connect(gainF);
                    gainF.connect(audioCtx.destination);
                    oscF.start(audioCtx.currentTime + i * 0.05);
                    oscF.stop(audioCtx.currentTime + i * 0.05 + 0.15);
                }
            }
            else if (type === 'gameover') {
                // 빵빠레 화음 축하 멜로디
                const melody = [261.63, 329.63, 392.00, 523.25, 659.25, 783.99]; 
                melody.forEach((freq, idx) => {
                    const oscM = audioCtx.createOscillator();
                    const gainM = audioCtx.createGain();
                    oscM.type = 'sine';
                    oscM.frequency.setValueAtTime(freq, audioCtx.currentTime + idx * 0.08);
                    gainM.gain.setValueAtTime(0.15, audioCtx.currentTime + idx * 0.08);
                    gainM.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + idx * 0.08 + 0.2);
                    oscM.connect(gainM);
                    gainM.connect(audioCtx.destination);
                    oscM.start(audioCtx.currentTime + idx * 0.08);
                    oscM.stop(audioCtx.currentTime + idx * 0.08 + 0.2);
                });
            }
        }

        // 난이도 변경 함수
        function setDifficulty(level) {
            if (startBtn.disabled) return;
            difficulty = level;
            document.querySelectorAll('.difficulty-btn').forEach(btn => {
                btn.classList.remove('bg-amber-500', 'text-white', 'shadow');
                btn.classList.add('text-slate-600');
            });
            const activeBtn = document.getElementById(`btn-${level}`);
            activeBtn.classList.remove('text-slate-600');
            activeBtn.classList.add('bg-amber-500', 'text-white', 'shadow');
        }

        // 랜덤 타이머 계산
        function randomTime(min, max) {
            return Math.round(Math.random() * (max - min) + min);
        }

        // 구멍 랜덤 선택
        function randomHole() {
            const idx = Math.floor(Math.random() * moles.length);
            if (idx === lastHoleIndex) {
                return randomHole();
            }
            lastHoleIndex = idx;
            return moles[idx];
        }

        // 둥실 피드백 텍스트 효과 만들기
        function showFloatingText(e, text, colorClass) {
            let posX, posY;
            
            if (e) {
                const rect = gameBoardArea.getBoundingClientRect();
                posX = e.clientX - rect.left;
                posY = e.clientY - rect.top;
            } else {
                posX = gameBoardArea.clientWidth / 2;
                posY = gameBoardArea.clientHeight / 2;
            }

            const floatDiv = document.createElement('div');
            floatDiv.className = `floating-text absolute ${colorClass} text-3xl font-extrabold drop-shadow-md z-30`;
            floatDiv.style.left = `${posX}px`;
            floatDiv.style.top = `${posY}px`;
            floatDiv.textContent = text;

            gameBoardArea.appendChild(floatDiv);

            setTimeout(() => {
                floatDiv.remove();
            }, 800);
        }

        // 피버타임 개시 기능
        function startFeverMode() {
            if (isFeverMode) return;
            isFeverMode = true;
            playSound('fever-start');

            // 테마 적용
            document.body.classList.add('fever-active-bg');
            gridBoard.classList.add('fever-glow');
            mainHeader.classList.add('fever-glow');
            mainFooter.classList.add('fever-glow');
            feverBanner.classList.remove('hidden');

            showFloatingText(null, "FEVER TIME! X2 POINTS!", "text-yellow-400 text-4xl animate-pulse");

            // 5초 후 피버 종료
            feverTimeout = setTimeout(() => {
                endFeverMode();
            }, 5000);
        }

        // 피버타임 종료 기능
        function endFeverMode() {
            isFeverMode = false;
            combo = 0;
            feverGaugeSpan.textContent = `0/7`;
            comboContainer.classList.add('hidden');
            
            document.body.classList.remove('fever-active-bg');
            gridBoard.classList.remove('fever-glow');
            mainHeader.classList.remove('fever-glow');
            mainFooter.classList.remove('fever-glow');
            feverBanner.classList.add('hidden');
        }

        // 두더지 등장 제어
        function peep() {
            const currentSpeed = speeds[difficulty];
            const time = randomTime(currentSpeed.min, currentSpeed.max);
            const mole = randomHole();
            
            // 랜덤 두더지 배정 알고리즘
            const randVal = Math.random();
            let moleType = 'normal';

            if (isFeverMode) {
                // 피버 모드일 때는 폭탄은 아예 없고 고득점/시간 연장형 위주로 출현!
                if (randVal < 0.50) {
                    moleType = 'golden';
                } else if (randVal < 0.65) {
                    moleType = 'clock';
                } else {
                    moleType = 'normal';
                }
            } else {
                // 평소 모드 출현 확률
                if (randVal < 0.15) {
                    moleType = 'golden';  // 황금 두더지 (15%)
                } else if (randVal < 0.30) {
                    moleType = 'bomb';    // 폭탄 두더지 (15%)
                } else if (randVal < 0.40) {
                    moleType = 'clock';   // 시계 보너스 두더지 (10%)
                } else {
                    moleType = 'normal';  // 일반 두더지 (60%)
                }
            }

            mole.dataset.type = moleType;
            mole.querySelector('.mole-svg').innerHTML = svgTemplates[moleType].alive;
            
            mole.classList.add('up');
            mole.dataset.hit = "false";

            // 피버 모드 중이거나 황금 두더지일 때는 훨씬 바쁘게 움직임!
            let holdTime = time;
            if (moleType === 'golden') holdTime = time * 0.7;
            if (isFeverMode) holdTime = holdTime * 0.75; 

            moleTimeout = setTimeout(() => {
                mole.classList.remove('up');
                if (!timeUp) peep();
            }, holdTime);
        }

        // 게임 시작 실행
        function startGame() {
            if (timerInterval) clearInterval(timerInterval);
            if (moleTimeout) clearTimeout(moleTimeout);
            if (feverTimeout) clearTimeout(feverTimeout);

            endFeverMode();

            score = 0;
            combo = 0;
            timeLeft = totalGameTime;
            timeUp = false;
            
            scoreDisplay.textContent = '0';
            timerDisplay.textContent = `${totalGameTime}초`;
            timeBar.style.width = '100%';
            feverGaugeSpan.textContent = `0/7`;
            
            comboContainer.classList.add('hidden');

            startBtn.disabled = true;
            startBtn.classList.add('opacity-50', 'cursor-not-allowed');

            peep();

            // 타이머 루프
            timerInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft < 0) timeLeft = 0;
                timerDisplay.textContent = `${timeLeft}초`;

                // 시간 바 애니메이션 갱신
                const pct = (timeLeft / totalGameTime) * 100;
                timeBar.style.width = `${pct}%`;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        // 점수대별 등급 칭호 수여 함수
        function getTitleByScore(finalScore) {
            if (finalScore < 15) {
                return "아기 두더지 파수꾼 🐹";
            } else if (finalScore >= 15 && finalScore < 30) {
                return "정원 수호 대장 🌿";
            } else if (finalScore >= 30 && finalScore < 45) {
                return "베테랑 황금 망치 🔨";
            } else if (finalScore >= 45 && finalScore < 60) {
                return "빛의 속도 사냥꾼 ⚡";
            } else {
                return "전설의 두더지 신성 👑";
            }
        }

        // 게임 종료 처리
        function endGame() {
            timeUp = true;
            clearInterval(timerInterval);
            clearTimeout(moleTimeout);
            if (feverTimeout) clearTimeout(feverTimeout);

            moles.forEach(mole => mole.classList.remove('up'));
            comboContainer.classList.add('hidden');
            endFeverMode();

            let isNewRecord = false;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('whackMoleHighScore', highScore);
                highScoreDisplay.textContent = highScore;
                isNewRecord = true;
            }

            // 등급 칭호 계산 후 모달에 반영
            modalTitle.textContent = getTitleByScore(score);
            modalScore.textContent = `${score}점`;

            if (isNewRecord) {
                newRecordTag.classList.remove('hidden');
            } else {
                newRecordTag.classList.add('hidden');
            }

            modal.classList.remove('hidden');
            playSound('gameover');

            startBtn.disabled = false;
            startBtn.classList.remove('opacity-50', 'cursor-not-allowed');
        }

        // 두더지 타격
        function whack(e) {
            if (!e.isTrusted) return; // 부정 클릭 무시

            const mole = this;
            if (mole.dataset.hit === "true") return; 
            mole.dataset.hit = "true";

            const moleType = mole.dataset.type;
            let pointDelta = 0;
            let textEffect = '';
            let colorClass = '';

            // 피버 모드 점수 배율 결정
            const multiplier = isFeverMode ? 2 : 1;

            if (moleType === 'normal') {
                pointDelta = 1 * multiplier;
                combo++;
                textEffect = isFeverMode ? `+2 FEVER!` : `+1`;
                colorClass = 'text-green-500';
                playSound('normal');
            } 
            else if (moleType === 'golden') {
                pointDelta = 2 * multiplier;
                combo++;
                textEffect = isFeverMode ? `+4 FEVER!` : `+2 Premium!`;
                colorClass = 'text-yellow-400';
                playSound('golden');
            } 
            else if (moleType === 'clock') {
                pointDelta = 0; // 점수 대신 시간 보너스!
                timeLeft += 3;
                if (timeLeft > totalGameTime) timeLeft = totalGameTime; // 최대 한계 제한
                timerDisplay.textContent = `${timeLeft}초`;
                combo++;
                textEffect = `⏰ +3 Sec!`;
                colorClass = 'text-blue-500 font-bold';
                playSound('clock');
            }
            else if (moleType === 'bomb') {
                pointDelta = -2;
                combo = 0; // 폭탄 폭발 시 콤보 완전 초기화
                textEffect = `💣 -2 Boom!`;
                colorClass = 'text-red-600 font-extrabold';
                playSound('bomb');
            }

            score += pointDelta;
            if (score < 0) score = 0; 
            scoreDisplay.textContent = score;

            // 피버 모드가 아닐 때만 콤보 게이지를 쌓아 피버 발동
            if (!isFeverMode) {
                if (combo >= 7) {
                    startFeverMode();
                } else {
                    feverGaugeSpan.textContent = `${combo}/7`;
                }
            }

            // 콤보 뱃지 노출 설정
            if (combo >= 2) {
                comboCountSpan.textContent = combo;
                comboContainer.classList.remove('hidden');
            } else {
                comboContainer.classList.add('hidden');
            }

            // 데미지 둥실 텍스트 생성
            showFloatingText(e, textEffect, colorClass);

            // 중요: 3번 기능 - 즉시 때렸을 때의 울상 뚝딱 표정으로 변경!
            mole.querySelector('.mole-svg').innerHTML = svgTemplates[moleType].hit;

            // 표정을 볼 수 있도록 아주 살짝 지연(180ms) 후에 쏙 들어가게 세팅!
            setTimeout(() => {
                mole.classList.remove('up');
            }, 180);

            // 망치 타격 진동 효과
            const hole = mole.parentElement;
            hole.classList.add('hit-effect');
            setTimeout(() => {
                hole.classList.remove('hit-effect');
            }, 150);
        }

        // 게임 리셋
        function resetGame() {
            clearInterval(timerInterval);
            clearTimeout(moleTimeout);
            if (feverTimeout) clearTimeout(feverTimeout);

            endFeverMode();

            moles.forEach(mole => mole.classList.remove('up'));
            score = 0;
            combo = 0;
            timeLeft = totalGameTime;
            timeUp = true;
            scoreDisplay.textContent = '0';
            timerDisplay.textContent = `${totalGameTime}초`;
            timeBar.style.width = '100%';
            comboContainer.classList.add('hidden');
            feverGaugeSpan.textContent = `0/7`;
            startBtn.disabled = false;
            startBtn.classList.remove('opacity-50', 'cursor-not-allowed');
        }

        function closeModal() {
            modal.classList.add('hidden');
            startGame();
        }

        // 이벤트 연결
        moles.forEach(mole => mole.addEventListener('click', whack));
        startBtn.addEventListener('click', startGame);
        resetBtn.addEventListener('click', resetGame);
        modalCloseBtn.addEventListener('click', closeModal);
    </script>
